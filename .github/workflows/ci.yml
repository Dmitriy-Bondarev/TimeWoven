name: TimeWoven CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Code quality (ruff, black)
        run: |
          ruff check app scripts
          black --check app scripts

      - name: Migrations check (alembic offline + single head)
        env:
          # Offline mode doesn't connect; URL is used for dialect rendering/import safety.
          DATABASE_URL: postgresql+psycopg2://ci:ci@localhost:5432/timewoven_ci
        run: |
          alembic heads
          alembic upgrade head --sql > /dev/null

      - name: Tests (pytest; allow empty suite)
        shell: bash
        run: |
          set -euo pipefail
          pytest -q || rc=$?
          if [[ "${rc:-0}" -eq 0 ]]; then exit 0; fi
          if [[ "$rc" -eq 5 ]]; then
            echo "pytest: no tests collected (allowed)"
            exit 0
          fi
          exit "$rc"
