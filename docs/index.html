<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TimeWoven — Цифровой семейный архив</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }

    .logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      border-radius: 28px;
      margin-bottom: 32px;
      box-shadow: 0 8px 40px rgba(120,80,200,0.35);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #c8a96e, #a07840);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 1.05rem;
      color: #9b8ea8;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 10px 22px;
      font-size: 0.9rem;
      color: #b0a0c0;
      backdrop-filter: blur(10px);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f0a030;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="TimeWoven" class="logo" />
    <h1>TimeWoven</h1>
    <p class="tagline">Цифровой семейный архив.<br/>Храните историю своей семьи.</p>
    <div class="badge">
      <div class="dot"></div>
      В разработке
    </div>
  </div>
</body>
</html>
