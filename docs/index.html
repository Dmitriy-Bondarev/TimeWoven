<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TimeWoven — цифровой семейный архив. Храните историю своей семьи для будущих поколений." />
  <meta property="og:title" content="TimeWoven — Цифровой семейный архив" />
  <meta property="og:description" content="Храните историю своей семьи для будущих поколений." />
  <meta property="og:image" content="https://timewoven.ru/logo.png" />
  <meta property="og:url" content="https://timewoven.ru/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/png" href="logo.png" />
  <title>TimeWoven — Цифровой семейный архив</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0d0d12;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --gold: #c8a96e;
      --text: #e8e0d8;
      --muted: #7a7080;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    header img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: contain;
    }

    header span {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.3px;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .hero {
      text-align: center;
      max-width: 520px;
    }

    .logo-wrap {
      margin-bottom: 36px;
    }

    .logo-wrap img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(200, 169, 110, 0.2);
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #c8a96e 0%, #e8d5a8 50%, #a07840 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 14px;
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 12px 24px;
      font-size: 0.9rem;
      color: #a090b0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.3;
        transform: scale(0.8);
      }
    }

    footer {
      padding: 20px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      gap: 16px;
      flex-wrap: wrap;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    footer a:hover {
      color: var(--gold);
    }

    @media (max-width: 640px) {
      header,
      footer {
        padding: 16px 20px;
      }

      h1 {
        font-size: 2.1rem;
      }

      .tagline {
        font-size: 1rem;
      }

      .logo-wrap img {
        width: 96px;
        height: 96px;
      }

      footer {
        justify-content: center;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="TimeWoven" />
    <span>TimeWoven</span>
  </header>

  <main>
    <section class="hero" aria-label="Главный экран">
      <div class="logo-wrap">
        <img src="logo.png" alt="TimeWoven — Цифровой семейный архив" />
      </div>
      <h1>TimeWoven</h1>
      <p class="tagline">
        Цифровой семейный архив.<br />
        Храните историю своей семьи для будущих поколений.
      </p>
      <div class="badge">
        <div class="dot"></div>
        Сайт в разработке
      </div>
    </section>
  </main>

  <footer>
    <span>© 2026 TimeWoven</span>
    <a href="mailto:hello@timewoven.ru">hello@timewoven.ru</a>
  </footer>
</body>
</html>
