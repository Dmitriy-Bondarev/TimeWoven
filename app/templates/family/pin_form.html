<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Введите PIN — TimeWoven</title>
  <style>
    :root {
      --bg: #020617;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #f59e0b;
      --border: rgba(148,163,184,0.2);
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 380px);
      background: rgba(15,23,42,0.96);
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 36px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .avatar {
      width: 80px; height: 80px;
      border-radius: 999px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.15);
      margin-bottom: 16px;
    }
    .avatar-fallback {
      width: 80px; height: 80px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      display: grid; place-items: center;
      color: var(--muted); font-size: 12px;
      margin: 0 auto 16px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--error);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .pin-input {
      width: 100%;
      text-align: center;
      font-size: 28px;
      letter-spacing: 8px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.9);
      color: var(--text);
      margin-bottom: 16px;
    }
    .pin-input:focus { outline: none; border-color: var(--accent); }
    .btn {
      width: 100%;
      background: var(--accent);
      color: #111827;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .back-link {
      display: block;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      margin-top: 8px;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    {% if avatar_url %}
      <img class="avatar" src="{{ avatar_url }}" alt="{{ name }}">
    {% else %}
      <div class="avatar-fallback">Нет фото</div>
    {% endif %}

    <h1>{{ name }}</h1>
    <p class="subtitle">Введите ваш PIN-код</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <input type="hidden" name="person_id" value="{{ person_id }}">
      <input type="hidden" name="next" value="{{ next }}">
      <input
        class="pin-input"
        type="password"
        name="pin"
        maxlength="6"
        inputmode="numeric"
        pattern="[0-9]*"
        autofocus
        placeholder="••••"
        required
      >
      <button class="btn" type="submit">Войти</button>
    </form>

    <a href="/who-am-i" class="back-link">← Выбрать другого участника</a>
  </div>
</body>
</html>
