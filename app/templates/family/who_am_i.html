<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Кто вы?</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #020617;
      --card: #020617;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #f59e0b;
      --border: rgba(148,163,184,0.4);
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 520px);
      background: rgba(15,23,42,0.96);
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    select {
      border-radius: 12px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.9);
      color: var(--text);
      font-size: 14px;
    }
    button {
      margin-top: 8px;
      background: var(--accent);
      color: #111827;
      border-radius: 14px;
      border: none;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }
    .back-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>Кто вы?</h1>
    <p>Выберите себя из семейного круга, чтобы подписывать ответы.</p>

    <form method="post">
      <input type="hidden" name="next" value="{{ next or '/' }}">
      <select name="person_id" required>
        {% for person in people %}
          <option value="{{ person.id }}">{{ person.name }}</option>
        {% endfor %}
      </select>
      <button type="submit">Продолжить</button>
    </form>

    <a href="/" class="back-link">← Вернуться к импульсу дня</a>
  </section>
</body>
</html>
