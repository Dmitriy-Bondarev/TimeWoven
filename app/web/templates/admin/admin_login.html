<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход для администратора — TimeWoven</title>
  <style>
    :root {
      --bg: #020617;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #f59e0b;
      --border: rgba(148,163,184,0.2);
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 380px);
      background: rgba(15,23,42,0.96);
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 36px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--error);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .field {
      margin-bottom: 12px;
      text-align: left;
    }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.9);
      color: var(--text);
      font-size: 15px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .btn {
      width: 100%;
      background: var(--accent);
      color: #111827;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      margin-bottom: 12px;
    }
    .back-link {
      display: block;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Вход для администратора</h1>
    <p class="subtitle">Только для управления проектом</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="field">
        <label for="username">Имя пользователя</label>
        <input id="username" type="text" name="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" type="password" name="password" required>
      </div>
      <button class="btn" type="submit">Войти</button>
    </form>

    <a href="/" class="back-link">← На главную</a>
  </div>
</body>
</html>
