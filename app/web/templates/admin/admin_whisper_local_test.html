<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проверка Whisper — TimeWoven</title>
  <link rel="stylesheet" href="/static/site/theme.css" />
  <style>
    body { font-family: system-ui, sans-serif; background: #020617; color: #e5e7eb; padding: 24px; max-width: 900px; margin: 0 auto; }
    a { color: #f59e0b; }
    h1 { color: #f59e0b; font-size: 22px; }
    .err { color: #f87171; margin: 12px 0; }
    pre { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 12px; overflow: auto; font-size: 12px; }
    form { margin-top: 16px; }
    input[type="file"] { color: #cbd5e1; }
  </style>
</head>
<body>
  <a href="/admin">&larr; Админ-панель</a>
  <h1>Локальный Whisper</h1>
  <p>Endpoint: <code>{{ whisper_local_url|e }}</code> (provider: {{ whisper_provider|e }})</p>
  {% if error %}
  <p class="err">{{ error|e }}</p>
  {% endif %}
  {% if result %}
  <pre>{{ result | tojson(indent=2) }}</pre>
  {% endif %}
  <form method="post" enctype="multipart/form-data">
    <p><input type="file" name="file" accept="audio/*" required></p>
    <p><button type="submit" style="background:#f59e0b;color:#111827;border:none;padding:8px 14px;border-radius:8px;font-weight:600;cursor:pointer;">Отправить аудио</button></p>
  </form>
</body>
</html>
