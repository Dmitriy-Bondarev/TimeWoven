<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проверка LLM — TimeWoven</title>
  <link rel="stylesheet" href="/static/site/theme.css" />
  <style>
    body { font-family: system-ui, sans-serif; background: #020617; color: #e5e7eb; padding: 24px; max-width: 900px; margin: 0 auto; }
    a { color: #f59e0b; }
    h1 { color: #f59e0b; font-size: 22px; }
    .ok { color: #4ade80; }
    .bad { color: #f87171; }
    pre { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 12px; overflow: auto; font-size: 12px; }
  </style>
</head>
<body>
  <a href="/admin">&larr; Админ-панель</a>
  <h1>Локальный LLM ({{ provider|e }})</h1>
  <p class="{{ 'ok' if ok else 'bad' }}">{% if ok %}Сервис ответил успешно (status=ok, есть summary).{% else %}Проверка не прошла или пустой ответ — смотрите JSON ниже.{% endif %}</p>
  <pre>{{ result | tojson(indent=2) }}</pre>
</body>
</html>
