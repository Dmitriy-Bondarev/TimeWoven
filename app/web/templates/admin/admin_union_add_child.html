<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добавить ребёнка к союзу</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #020617;
      --card: #0f172a;
      --line: #1e293b;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --danger: #f43f5e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #1f2937 0%, #020617 50%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    .container { max-width: 760px; margin: 0 auto; }
    .back {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
    }
    h1 {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 30px;
    }
    .muted { color: var(--muted); font-size: 14px; margin: 0 0 14px; }
    .error {
      margin: 0 0 16px;
      border: 1px solid color-mix(in oklab, var(--danger), white 25%);
      background: color-mix(in oklab, var(--danger), transparent 85%);
      color: #fecdd3;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    form {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #111827 0%, var(--card) 100%);
      border-radius: 12px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    select {
      width: 100%;
      background: #020617;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 4px;
    }
    .ghost {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 10px 8px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 18px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #1f2937;
    }
  </style>
</head>
<body>
  <div class="container">
    {% if person_id %}
      <a href="/admin/people/{{ person_id }}/edit" class="back">&larr; Назад к персоне</a>
    {% else %}
      <a href="/admin/people" class="back">&larr; К списку персон</a>
    {% endif %}

    <h1>Добавить ребёнка к союзу #{{ union.id }}</h1>
    <p class="muted">Партнёры: {{ partner1_name }} и {{ partner2_name }}</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/unions/{{ union.id }}/add-child">
      <input type="hidden" name="person_id" value="{{ form_data.get('person_id', '') }}">

      <div>
        <label for="child_id">Ребёнок</label>
        <select id="child_id" name="child_id" required>
          <option value="">Выберите ребёнка</option>
          {% for p in people_options %}
            <option value="{{ p.person_id }}" {% if form_data.get('child_id')|string == p.person_id|string %}selected{% endif %}>
              {{ p.name }} (ID {{ p.person_id }})
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="actions">
        {% if person_id %}
          <a class="ghost" href="/admin/people/{{ person_id }}/edit">Отмена</a>
        {% else %}
          <a class="ghost" href="/admin/people">Отмена</a>
        {% endif %}
        <button type="submit">Добавить ребёнка</button>
      </div>
    </form>
  </div>
</body>
</html>
