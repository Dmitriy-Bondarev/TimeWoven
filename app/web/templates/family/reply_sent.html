<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Ответ отправлен — TimeWoven</title>
  <style>
    :root {
      --bg: #020617;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #f59e0b;
      --border: rgba(148,163,184,0.2);
      --ok: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 480px);
      background: rgba(15,23,42,0.96);
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 36px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .icon {
      font-size: 52px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
      margin-bottom: 28px;
    }
    .author-line {
      color: var(--accent);
      font-size: 14px;
      margin-bottom: 28px;
    }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: var(--accent);
      color: #111827;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 12px;
    }
    .btn-secondary {
      display: block;
      text-align: center;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      padding: 8px;
    }
    .btn-secondary:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💌</div>
    <h1>Ответ отправлен</h1>
    <p class="subtitle">
      Ваши слова сохранены и станут частью семейной памяти.<br>
      Следующие поколения прочитают их спустя годы.
    </p>
    {% if author_name %}
      <div class="author-line">Подписано: {{ author_name }}</div>
    {% endif %}
    <a href="/" class="btn">← Вернуться к импульсу дня</a>
    <a href="/family/reply/{{ memory_id }}" class="btn-secondary">Посмотреть все ответы</a>
  </div>
</body>
</html>
