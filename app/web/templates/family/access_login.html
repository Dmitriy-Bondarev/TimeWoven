<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Семейный вход — TimeWoven</title>
  <style>
    :root {
      --bg-0: #0f172a;
      --bg-1: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --err: #f87171;
      --line: rgba(148, 163, 184, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 10% 0%, rgba(245, 158, 11, 0.2), transparent 55%),
        linear-gradient(150deg, var(--bg-0) 0%, var(--bg-1) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }
    h1 { font-size: 1.3rem; margin: 0 0 8px; color: var(--accent); }
    p { margin: 0 0 14px; line-height: 1.55; color: var(--text); }
    .hint { color: var(--muted); font-size: 0.92rem; }
    .err { color: var(--err); font-size: 0.95rem; margin-bottom: 12px; }
    label { display: block; font-size: 0.9rem; color: var(--muted); margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #020617;
      color: var(--text);
      font-size: 1rem;
      font-family: ui-monospace, monospace;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #111827;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Семейный вход</h1>
    {% if not access_permitted %}
    <p class="hint">Семейный доступ для этой карточки ещё не настроен администратором.</p>
    {% else %}
    <p class="hint">Введите 6-значный код из приложения-аутентификатора или одноразовый резервный код.</p>
    {% if error %}
    <p class="err">{{ error }}</p>
    {% endif %}
    <form method="post" action="/family/access/{{ public_uuid|e }}">
      <input type="hidden" name="next" value="{{ next|e }}" />
      <label for="code">Код</label>
      <input type="text" name="code" id="code" autocomplete="one-time-code" inputmode="numeric" required />
      <button type="submit">Войти</button>
    </form>
    {% endif %}
  </div>
</body>
</html>
