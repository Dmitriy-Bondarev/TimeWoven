<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редактирование воспоминания</title>
  <style>
    :root {
      --bg-0: #0f172a;
      --bg-1: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --line: rgba(148, 163, 184, 0.22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", -apple-system, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(155deg, var(--bg-0) 0%, var(--bg-1) 100%);
      padding: 24px 18px 48px;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    .back { display: inline-block; margin-bottom: 20px; font-size: 13px; color: var(--muted); text-decoration: none; }
    .back:hover { color: var(--text); }
    h1 { margin: 0 0 8px; font-size: 1.4rem; font-weight: 700; }
    .sub { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px 20px 18px;
      background: rgba(15, 23, 42, 0.78);
    }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
    .field { margin-bottom: 16px; }
    textarea {
      width: 100%;
      min-height: 100px;
      background: rgba(2, 6, 23, 0.5);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px; line-height: 1.5;
      font-family: inherit;
      resize: vertical;
    }
    textarea:focus { outline: none; border-color: rgba(245, 158, 11, 0.45); }
    .actions { display: flex; flex-wrap: wrap; gap: 12px 20px; align-items: center; margin-top: 8px; }
    button {
      background: var(--accent);
      color: #111827;
      border: none;
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.04); }
    a.cancel { font-size: 14px; color: #94a3b8; text-decoration: none; font-weight: 500; }
    a.cancel:hover { color: #cbd5e1; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/family/person/{{ person_id }}">← К карточке</a>
    <h1>Редактирование текста</h1>
    <p class="sub">Запись #{{ memory_id }}: текст сохраняется в той же записи; статус публикации не меняется.</p>
    <div class="card">
      <form method="post" action="/family/memory/{{ memory_id }}/edit">
        <input type="hidden" name="return_person_id" value="{{ person_id }}">
        <div class="field">
          <label for="t_verbatim">Дословно (verbatim)</label>
          <textarea id="t_verbatim" name="transcript_verbatim" rows="4">{{ transcript_verbatim|e }}</textarea>
        </div>
        <div class="field">
          <label for="t_read">Читаемый текст (readable)</label>
          <textarea id="t_read" name="transcript_readable" rows="6">{{ transcript_readable|e }}</textarea>
        </div>
        <div class="actions">
          <button type="submit">Сохранить</button>
          <a class="cancel" href="/family/person/{{ person_id }}">Отмена</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
