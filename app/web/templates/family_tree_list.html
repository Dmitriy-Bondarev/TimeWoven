<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Family Tree</title>
</head>
<body>
<h1>Семья</h1>

{% for family in families %}
  <h2>{{ family.parents }}</h2>
  <ul>
    {% for child in family.children %}
      <li>{{ child }}</li>
    {% endfor %}
  </ul>
{% endfor %}

</body>
</html>
