  value_eyebrow: "About TimeWoven"
  value_title: "Keep the story—without living in folders"
  value_description: "TimeWoven turns scattered photos and messages into something you can actually read: who is in the picture, what was happening, when it was, and how your family remembers it."

  feature_1_title: "People and moments stay linked"
  feature_1_text: "Every entry connects to the people, place, and date—so family history reads like a narrative, not a pile of notes."
  feature_2_title: "Voice, tone, and context"
  feature_2_text: "A memory isn’t only text. Keep the voice note, a short explanation, and the context around it—who said it, and why it matters."
  feature_3_title: "Find what you meant, not what you named"
  feature_3_text: "Search by people, time, and events—and by the connections between memories."

  scenario_eyebrow: "Who TimeWoven is for"
  scenario_title: "When TimeWoven is especially helpful"
  scenario_description: "You don’t need to start with a “big project.” Begin with one moment your family remembers well. TimeWoven places it in the timeline and connects it to the people, place, and time."
  step_1_number: "Step 01"
  step_1_title: "Name the moment"
  step_1_text: "A couple of lines is enough: what happened, who it’s about, and why it matters."
  step_2_number: "Step 02"
  step_2_title: "Add the people and the details"
  step_2_text: "Link relatives, dates, places, photos, and short notes—so it becomes a shared memory, not a private draft."
  step_3_number: "Step 03"
  step_3_title: "Watch the timeline form"
  step_3_text: "Related fragments appear nearby. From there, it’s easy to keep going—reading, adding, and keeping details from slipping away."

  demo_eyebrow: "What it looks like"
  demo_title: "Events, people, and voices—together"
  demo_description: "In TimeWoven, an event connects to the people in it, the place, the time, and related memories. Open something like “Parents’ wedding” to see everyone involved, view photos, and listen to short voice recollections."
