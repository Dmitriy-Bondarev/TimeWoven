  eyebrow: "История семьи не должна теряться"
  hero_title: "История семьи не должна теряться в чатах и папках"
  hero_description: "Приложение TimeWoven собирает воспоминания, фотографии и голоса близких в одном месте и связывает их в понятную историю семьи. Важные моменты перестают расползаться по перепискам и папкам и становятся частью общей ленты памяти."
  cta_primary: "Запишись на ранний доступ"
  cta_secondary: "Посмотреть пример"

  proof_1_strong: "Одна история"
  proof_1_text: "из множества людей, дат и событий в одной ленте памяти семьи"
  proof_2_strong: "Голос и текст"
  proof_2_text: "воспоминание остаётся живым и понятным для следующих поколений"
  proof_3_strong: "Поиск по смыслу"
  proof_3_text: "можно искать по событиям и людям, а не по названию файла"
  proof_aria: "Ключевые преимущества"

  panel_aria: "Пример живой истории"
  panel_label: "Пример ленты семейных воспоминаний"
  thread_1_meta_left: "1967 → Ростов-на-Дону"
  thread_1_meta_right: "связано с 4 людьми"
  thread_1_title: "Свадьба, о которой все вспоминают по‑разному"
  thread_1_text: "Один и тот же день складывается из голоса, писем, снимков и коротких комментариев разных поколений. Из разрозненных деталей получается одна понятная семейная история."
  thread_2_meta_left: "1989 → семейный переезд"
  thread_2_meta_right: "11 семейных артефактов"
  thread_2_title: "Память как маршрут, а не архив"
  thread_2_text: "Каждая запись связана с людьми, местом, веткой семьи и важным поворотом истории. По этим связям можно пройтись, как по маршруту, а не листать кучу несвязанных файлов."
  thread_3_meta_left: "Сегодня → для следующих поколений"
  thread_3_meta_right: "доступ по ролям"
  thread_3_title: "Семейная история продолжается"
  thread_3_text: "Новые голоса и документы добавляются в общую ленту без хаоса в папках. История семьи растёт дальше и остаётся понятной тем, кто придёт после."

  value_eyebrow: "О проекте TimeWoven"
  value_title: "Приложение TimeWoven помогает сохранить историю семьи, а не только файлы"
  value_description: "TimeWoven помогает собрать важные семейные моменты в папках и переписках. Вместо набора файлов появляется понятная картина: кто на снимках с кем, какое событие произошло, когда это было и как об этом вспоминают в семье."

  feature_1_title: "Связи между людьми и событиями"
  feature_1_text: "Каждое событие связано с людьми, датой, местом и вещами. Историю можно читать как цельный рассказ, а не искать куски в разных чатах, папках и приложениях."
  feature_2_title: "Голос, интонация, контекст"
  feature_2_text: "Воспоминание хранится не только как текст. Рядом остаются голос, короткое пояснение и контекст — кто это сказал и к какому моменту жизни относится."
  feature_3_title: "Поиск по смыслу, не по файлу"
  feature_3_text: "Можно искать не по именам файлов, а по событиям, периоду, ветке семьи или смысловым связям между воспоминаниями."

  scenario_eyebrow: "Кому подойдёт TimeWoven"
  scenario_title: "Когда приложение особенно полезно"
  scenario_description: "Начинать можно не с «большого проекта», а с одного живого эпизода. Запишите день, человека или событие, которое семья ещё хорошо помнит. Приложение TimeWoven поставит эту запись в ленту семьи и свяжет с людьми, местом и временем."
  step_1_number: "Шаг 01"
  step_1_title: "Сказать, что это был за момент"
  step_1_text: "Пару строк: что произошло, кто в центре воспоминания и почему это важно для вас. Этого достаточно, чтобы в ленте семьи появилась первая точка истории."
  step_2_number: "Шаг 02"
  step_2_title: "Связать с людьми и вещами вокруг"
  step_2_text: "Добавьте людей, даты, место, снимки и короткие комментарии. Так запись перестаёт быть личной заметкой и становится общим, живым и узнаваемым воспоминанием."
  step_3_number: "Шаг 03"
  step_3_title: "Посмотреть, как выстраивается лента семьи"
  step_3_text: "Рядом встанут другие фрагменты, и станет понятно, куда двигаться дальше: можно читать ленту, дополнять её и не бояться, что важные детали потеряются."

  demo_eyebrow: "Как это выглядит"
  demo_title: "События, люди и голоса — в одном месте"
  demo_description: "В TimeWoven каждое событие связывается с людьми, местом, временем и связанными воспоминаниями. Можно открыть, например, «Свадьба родителей», увидеть всех участников, фотографии и послушать короткие голосовые истории о том дне."
  demo_label_title: "Событие"
  demo_placeholder_title: "Например: семейный переезд в 1989"
  demo_label_date: "Дата или период"
  demo_placeholder_date: "1989"
  demo_label_text: "Воспоминание"
  demo_placeholder_text: "Что произошло и почему это важно для вашей семьи?"
  demo_btn_add: "Добавить воспоминание"
  demo_btn_sample: "Показать пример"

  timeline_item1_title: "Первый разговор с бабушкой на плёнке"
  timeline_item1_meta: "2026 · голос, текст, ветка семьи"
  timeline_item1_text: "Короткая запись встаёт в контекст: кто рассказывает, о каком времени речь и с какими эпизодами семьи это связано. Так один голос становится частью общей истории."
  timeline_item2_title: "Свадебный снимок"
  timeline_item2_meta: "1967 · место, дата, участники"
  timeline_item2_text: "Один снимок превращается в узел истории, если к нему привязать людей, дату, комментарии и другие семейные следы. Тогда он не теряется в бесконечной ленте фотографий."
  timeline_new_entry_suffix: "новая запись в ленте семьи"

